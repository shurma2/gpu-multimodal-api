name: build-and-push

# Builds the linux/amd64 CUDA image on GitHub's runners and pushes it to
# Docker Hub. Runs on every push to main, or manually via the Actions tab.
#
# Caching: the two slow stages are the llama.cpp CUDA build (~15 min) and the
# torch/NeMo pip install. GitHub Actions does not keep a Docker layer cache
# between runs by default, so without help every push rebuilds them from
# scratch. We use buildx registry cache (mode=max) stored in a dedicated
# `:buildcache` tag on Docker Hub. Because the llama.cpp ref and
# requirements.txt change rarely, those layers are restored from the registry
# and only the gateway/app code is rebuilt. A registry cache is preferred over
# committing a cache folder to the repo (multi-GB binaries do not belong in
# git) and over GitHub's `type=gha` cache (10 GB limit is too small for the
# CUDA + torch layers here).

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: reassel/gpu-multimodal-api

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The CUDA base + torch + final image are large; reclaim runner disk.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: reassel
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:1.0
            ${{ env.IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max
          provenance: false
