name: build-and-push

# Builds the linux/amd64 CUDA image on GitHub's runners and pushes it to
# Docker Hub. Runs on every push to main, or manually via the Actions tab.

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: reassel/gpu-multimodal-api

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The CUDA base + torch + final image are large; reclaim runner disk.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: reassel
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:1.0
            ${{ env.IMAGE }}:latest
          provenance: false
