services:
  gpu-api:
    build:
      context: .
      args:
        # Match to the host's CUDA/driver if needed.
        CUDA_VERSION: "12.4.1"
    image: gpu-multimodal-api:latest
    container_name: gpu-multimodal-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      # Persist downloaded weights + HF cache across restarts.
      - ./models:/models
    shm_size: "2gb"
    # Large model load + first-token latency; give health checks room.
    stop_grace_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
